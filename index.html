<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUSIÓN CRACKS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro: #0a0a0f;
            --azul-neon: #00f0ff;
            --magenta-neon: #ff00aa;
            --dorado: #ffd700;
            --tarjeta: rgba(18, 18, 35, 0.92);
            --borde: rgba(0, 240, 255, 0.4);
            --rojo: #ff2d55;
            --live: #ff2d55;
        }

        /* SOPORTE PARA MANDO */
        :focus {
            outline: 3px solid var(--azul-neon) !important;
            box-shadow: 0 0 20px var(--azul-neon) !important;
            transform: scale(1.05);
            z-index: 10;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--negro); color: #e0f7ff; font-family: 'Roboto', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* CARRUSEL DE FONDO */
        .carousel-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .slide { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; filter: brightness(0.4) contrast(1.2); }
        .slide.active { opacity: 1; }

        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(5,5,15,0.9); backdrop-filter: blur(12px); border-bottom: 2px solid var(--azul-neon); padding: 8px 10px; z-index: 999; }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logo { width: 26px; height: 26px; filter: drop-shadow(0 0 8px var(--azul-neon)); }
        .title-main { font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 700; background: linear-gradient(90deg, var(--azul-neon), var(--magenta-neon), var(--dorado)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 10px rgba(0,240,255,0.5); }
        .byline { font-size: 7.5px; color: #88ddff; text-align: center; margin-bottom: 5px; }

        .download-buttons { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin: 3px 0; }
        .list-btn { padding: 5px 10px; border-radius: 16px; font-size: 8.5px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: 1px solid var(--borde); background: rgba(0,240,255,0.1); color: #fff; }
        .list-btn.active { background: linear-gradient(135deg, var(--azul-neon), var(--magenta-neon)); color: #000; border: none; }

        .main-content { padding-top: 155px; padding-bottom: 70px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; padding: 0 12px; }
        .card { position: relative; background: var(--tarjeta); padding: 10px; border-radius: 14px; text-align: center; border: 1px solid var(--borde); transition: 0.3s; cursor: pointer; }
        .card img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--azul-neon); margin-bottom: 5px; }
        .card span { font-size: 10px; font-weight: 700; display: block; }
        .live-badge { position: absolute; top: 5px; right: 5px; background: var(--live); color: white; font-size: 7px; font-weight: bold; padding: 2px 5px; border-radius: 8px; animation: blink 1.4s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        #player-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-container { position: relative; width: 94%; max-width: 900px; aspect-ratio: 16 / 9; background: #000; border: 2px solid var(--azul-neon); border-radius: 10px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-mini-bottom { position: absolute; bottom: 10px; left: 10px; background: var(--rojo); color: white; border: none; padding: 6px 14px; border-radius: 20px; font-size: 11px; }

        footer { position: fixed; bottom: 0; left: 0; right: 0; text-align: center; padding: 8px; font-size: 10px; color: var(--dorado); background: rgba(5,5,20,0.95); border-top: 1px solid var(--azul-neon); }
    </style>
</head>
<body>

<div class="carousel-bg" id="bg-carousel">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1519861531473-9200262188bf?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1547447134-cd3f5c716030?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1530915597336-d0620170dc07?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1627634777217-c864268db30c?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1599058917765-a780eda07a3e?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1461896836934-ffe607ba8211?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1544420284-a44456993a4c?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1521412644187-c49fa049e84d?q=80&w=1200')"></div>
</div>

<div class="header">
    <div class="header-top">
        <img src="https://i.postimg.cc/mDrdRhMG/logo1-31-151811.png" class="logo">
        <h1 class="title-main">FUSIÓN CRACKS+VPN</h1>
    </div>
    <div class="byline">@By PACO & @By D.D.M--Android + Ios</div>
    <div class="download-buttons">
        <div tabindex="0" id="btn-main" class="list-btn active" onclick="loadM3U(MAIN_M3U, true, this)">CANALES ACEX</div>
        <div tabindex="0" class="list-btn" onclick="loadM3U(EVENTS_M3U, true, this)">EVENTOS ACEX</div>
        <div tabindex="0" class="list-btn" onclick="loadXML_Ev2(this)">CANALES PRE</div>
        <div tabindex="0" class="list-btn" onclick="loadXML_Ev3(this)">EVENTOS PRE</div>
        <div tabindex="0" class="list-btn" onclick="loadXML_Ev4(this)">PRE + VPN</div>
        <div tabindex="0" class="list-btn" onclick="loadAgenda(this)">+ EVENTOS</div>
    </div>
    <div style="text-align:center; margin-top:2px;">
        <input tabindex="0" type="text" id="search" placeholder="BUSCAR..." onkeyup="filter()" style="width:130px; padding:4px; border-radius:16px; border:1px solid var(--borde); background:rgba(0,0,0,0.3); color:#fff; font-size:10px;">
    </div>
</div>

<div class="main-content">
    <div id="loading" style="text-align:center; padding:40px;">CARGANDO...</div>
    <div id="channel-list" class="grid" style="display:none;"></div>
</div>

<div id="player-modal">
    <div class="modal-container">
        <button tabindex="0" class="close-mini-bottom" onclick="closePlayer()">CERRAR</button>
        <iframe id="video-iframe" src="" allowfullscreen allow="autoplay"></iframe>
    </div>
</div>

<footer>⚡ FUSIÓN CRACKS ⚡ • EL DEPORTE SIN LÍMITES • 2026</footer>

<script>
    // LÓGICA INTACTA
    const MAIN_M3U = 'https://raw.githubusercontent.com/Icastresana/lista1/refs/heads/main/Probando';
    const EVENTS_M3U = 'https://raw.githubusercontent.com/Icastresana/lista1/main/eventos.m3u';
    const XML_EV2 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/lista_canales_DEPORTE-LIBRE.FANS.xml';
    const XML_EV3 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/eventos_livetv_sx_con_reproductores.xml';
    const XML_EV4 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/lista_sportsonlineci.xml';
    const AGENDA_URL = 'https://agenda-navy-six.vercel.app/agenda_deportiva.html';
    const LOGO = 'https://i.postimg.cc/mDrdRhMG/logo1-31-151811.png';

    let channels = [];
    const now = new Date();

    function setActive(el) { document.querySelectorAll('.list-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    function render() { document.getElementById('loading').style.display='none'; const list=document.getElementById('channel-list'); list.style.display='grid'; list.innerHTML=channels.map((c,i)=>`<div tabindex="0" class="card" onclick="play(${i})"><img src="${LOGO}"><span>${c.name}</span></div>`).join(''); }
    
    function loadM3U(u, f, el) { setActive(el); channels = []; fetch(u).then(r => r.text()).then(t => { t.split('\n').forEach((line, i, arr) => { if (line.startsWith('#EXTINF:')) { channels.push({ name: line.split(',').slice(1).join(','), link: arr[i+1]?.trim() }); } }); render(); }); }
    function loadXML_Ev2(el) { setActive(el); channels = []; fetch(XML_EV2).then(r => r.text()).then(t => { const x = new DOMParser().parseFromString(t, "text/xml"); x.querySelectorAll('channel, canal').forEach(item => { channels.push({ name: item.getAttribute('name'), link: item.querySelector('url')?.textContent }); }); render(); }); }
    function loadXML_Ev3(el) { setActive(el); channels = []; fetch(XML_EV3).then(r => r.text()).then(t => { const x = new DOMParser().parseFromString(t, "text/xml"); x.querySelectorAll('evento, event, item').forEach(ev => { const l = ev.querySelector('url, link')?.textContent; if(l) channels.push({ name: ev.querySelector('nombre, title')?.textContent, link: l }); }); render(); }); }
    function loadXML_Ev4(el) { setActive(el); channels = []; fetch(XML_EV4).then(r => r.text()).then(t => { const x = new DOMParser().parseFromString(t, "text/xml"); Array.from(x.getElementsByTagName("track")).forEach(tr => { channels.push({ name: tr.getElementsByTagName("title")[0]?.textContent, link: tr.getElementsByTagName("url")[0]?.textContent }); }); render(); }); }
    function loadAgenda(el) { setActive(el); channels = []; fetch(AGENDA_URL).then(r => r.text()).then(h => { const doc = new DOMParser().parseFromString(h, "text/html"); doc.querySelectorAll('table tr').forEach(row => { const a = row.querySelector('a'); if(a) channels.push({ name: a.textContent, link: a.href, type: 'agenda' }); }); render(); }); }

    function play(i) {
        const c = channels[i];
        if (c.type === 'agenda') { window.open(c.link, '_blank'); return; }
        if (c.link.includes('acestream://')) { window.location.href = c.link; return; }
        document.getElementById('video-iframe').src = c.link;
        document.getElementById('player-modal').style.display = 'flex';
    }
    function closePlayer() { document.getElementById('player-modal').style.display = 'none'; document.getElementById('video-iframe').src = ''; }

    // CARRUSEL
    let curIdx = 0;
    const slides = document.querySelectorAll('.slide');
    setInterval(() => { slides[curIdx].classList.remove('active'); curIdx = (curIdx + 1) % slides.length; slides[curIdx].classList.add('active'); }, 3000);

    // MANDO TV
    document.addEventListener('keydown', (e) => {
        const focusable = Array.from(document.querySelectorAll('div[tabindex="0"], input, button[tabindex="0"]'));
        let idx = focusable.indexOf(document.activeElement);
        if (e.key === 'ArrowRight') focusable[(idx + 1) % focusable.length].focus();
        if (e.key === 'ArrowLeft') focusable[(idx - 1 + focusable.length) % focusable.length].focus();
        if (e.key === 'Enter') document.activeElement.click();
    });

    loadM3U(MAIN_M3U, true, document.getElementById('btn-main'));
</script>
</body>
</html>
