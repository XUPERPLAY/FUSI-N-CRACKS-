<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUSIÓN CRACKS - FUTURISTIC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cian: #00f0ff;
            --neon-magenta: #ff00ff;
            --neon-amarillo: #fff000;
            --fondo-noche: #05050a;
            --cristal: rgba(20, 20, 35, 0.85);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--fondo-noche);
            color: #fff; 
            font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden;
        }

        /* FONDO DINÁMICO NÍTIDO */
        .carousel-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
        }
        .slide {
            position: absolute;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            filter: brightness(0.6) contrast(1.1);
        }
        .slide.active { opacity: 1; }

        /* CABECERA MULTICOLOR */
        .header { 
            position: fixed; 
            top: 0; left: 0; right: 0; 
            background: rgba(5, 5, 15, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 3px solid;
            border-image: linear-gradient(90deg, var(--neon-cian), var(--neon-magenta), var(--neon-amarillo)) 1;
            padding: 10px; 
            z-index: 1000; 
            text-align: center;
        }

        .title-main { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 20px; 
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00f0ff, #ff00ff);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .download-buttons { 
            display: flex; 
            overflow-x: auto; 
            gap: 8px; 
            padding: 10px 0;
            scrollbar-width: none;
        }
        .download-buttons::-webkit-scrollbar { display: none; }

        .list-btn { 
            flex: 0 0 auto;
            padding: 8px 15px; 
            border-radius: 5px; 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            border: 1px solid var(--neon-cian); 
            background: transparent; 
            color: var(--neon-cian);
            box-shadow: inset 0 0 5px var(--neon-cian);
        }

        .list-btn.active { 
            background: var(--neon-cian); 
            color: #000; 
            box-shadow: 0 0 15px var(--neon-cian);
        }

        #search { 
            width: 90%; 
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-magenta);
            color: #fff;
            padding: 8px;
            border-radius: 20px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
        }

        /* CUADRÍCULA DE CANALES ORIGINAL */
        .main-content { padding-top: 170px; padding-bottom: 80px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 15px; 
        }

        .card { 
            background: var(--cristal); 
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 15px; 
            padding: 15px;
            text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .card:active { transform: scale(0.95); border-color: var(--neon-magenta); }

        .card img { 
            width: 60px; height: 60px; 
            border-radius: 50%; 
            border: 2px solid var(--neon-cian);
            padding: 2px;
            margin-bottom: 10px;
        }

        .card span { 
            display: block; 
            font-size: 13px; 
            font-weight: 700; 
            color: #fff;
            text-transform: uppercase;
        }

        /* EL REPRODUCTOR INTEGRADO (VENTANA FLOTANTE) */
        #player-modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 2000; 
            background: rgba(0,0,0,0.85);
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            width: 100%;
            max-width: 500px;
            background: #000;
            border: 2px solid var(--neon-cian);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px var(--neon-cian);
            position: relative;
        }

        .iframe-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .close-btn { 
            width: 100%;
            background: linear-gradient(90deg, #ff0055, #ff00ff);
            color: white; 
            border: none; 
            padding: 12px; 
            font-weight: bold; 
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            cursor: pointer;
        }

        footer { 
            position: fixed; bottom: 0; width: 100%;
            background: rgba(5, 5, 15, 0.9);
            border-top: 1px solid var(--neon-cian);
            padding: 10px; text-align: center;
            font-size: 11px; font-weight: bold; color: var(--neon-cian);
        }
    </style>
</head>
<body>

<div class="carousel-bg">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1200')"></div>
</div>

<div class="header">
    <h1 class="title-main">FUSIÓN CRACKS+VPN</h1>
    <div class="download-buttons">
        <button id="btn-main" class="list-btn active" onclick="loadM3U(MAIN_M3U, this)">CANALES ACEX</button>
        <button class="list-btn" onclick="loadM3U(EVENTS_M3U, this)">EVENTOS ACEX</button>
        <button class="list-btn" onclick="loadXML(XML_EV2, this)">CANALES PRE</button>
        <button class="list-btn" onclick="loadXML(XML_EV3, this)">EVENTOS PRE</button>
        <button class="list-btn" onclick="loadXML(XML_EV4, this)">PRE + VPN</button>
    </div>
    <input type="text" id="search" placeholder="--- BUSCAR CANAL ---" onkeyup="filter()">
</div>

<div class="main-content">
    <div id="channel-list" class="grid"></div>
</div>

<div id="player-modal">
    <div class="modal-content">
        <div class="iframe-container">
            <iframe id="video-iframe" src="" allowfullscreen allow="autoplay"></iframe>
        </div>
        <button class="close-btn" onclick="closePlayer()">CERRAR REPRODUCTOR</button>
    </div>
</div>

<footer>⚡ EL DEPORTE SIN LÍMITES • 2026 ⚡</footer>

<script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    setInterval(() => {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
    }, 3000);

    const MAIN_M3U = 'https://raw.githubusercontent.com/Icastresana/lista1/refs/heads/main/Probando';
    const EVENTS_M3U = 'https://raw.githubusercontent.com/Icastresana/lista1/main/eventos.m3u';
    const XML_EV2 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/lista_canales_DEPORTE-LIBRE.FANS.xml';
    const XML_EV3 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/eventos_livetv_sx_con_reproductores.xml';
    const XML_EV4 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/lista_sportsonlineci.xml';
    const LOGO_DEFAULT = 'https://i.postimg.cc/mDrdRhMG/logo1-31-151811.png';

    let channels = [];

    function loadM3U(url, btn) {
        document.querySelectorAll('.list-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetch(url).then(r => r.text()).then(data => {
            channels = [];
            const lines = data.split('\n');
            for(let i=0; i<lines.length; i++) {
                if(lines[i].includes('#EXTINF')) {
                    const name = lines[i].split(',')[1] || "Canal";
                    const link = lines[i+1]?.trim();
                    if(link) channels.push({name, link});
                }
            }
            render();
        });
    }

    function loadXML(url, btn) {
        document.querySelectorAll('.list-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetch(url).then(r => r.text()).then(data => {
            channels = [];
            const parser = new DOMParser();
            const xml = parser.parseFromString(data, "text/xml");
            const items = xml.querySelectorAll('channel, canal, item, track');
            items.forEach(item => {
                const name = item.getAttribute('name') || item.querySelector('title')?.textContent || "Evento";
                const link = item.querySelector('url, link')?.textContent;
                if(link) channels.push({name, link});
            });
            render();
        });
    }

    function render(filterList = null) {
        const list = document.getElementById('channel-list');
        const data = filterList || channels;
        list.innerHTML = data.map((c, i) => `
            <div class="card" onclick="play('${c.link}')">
                <img src="${LOGO_DEFAULT}">
                <span>${c.name}</span>
            </div>
        `).join('');
    }

    function filter() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
        render(filtered);
    }

    function play(link) {
        if (link.includes('acestream://')) {
            window.location.href = link;
            return;
        }
        document.getElementById('video-iframe').src = link;
        document.getElementById('player-modal').style.display = 'flex';
    }

    function closePlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.getElementById('video-iframe').src = '';
    }

    // Carga inicial
    loadM3U(MAIN_M3U, document.getElementById('btn-main'));
</script>
</body>
</html>
