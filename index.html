<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUSIÓN CRACKS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cian: #00f0ff;
            --neon-magenta: #ff00ff;
            --fondo-dark: #0a0a0f;
            --glass: rgba(15, 15, 25, 0.9);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            background: var(--fondo-dark);
            color: #fff; 
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
        }

        /* FONDO DINÁMICO */
        .carousel-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .slide { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1s; filter: brightness(0.4); }
        .slide.active { opacity: 1; }

        /* CABECERA FUTURISTA */
        .header { 
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(5, 5, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-cian);
            padding: 10px; z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .title-main { 
            font-family: 'Orbitron', sans-serif; font-size: 18px; text-align: center;
            background: linear-gradient(90deg, var(--neon-cian), var(--neon-magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .download-buttons { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; scrollbar-width: none; }
        .download-buttons::-webkit-scrollbar { display: none; }

        .list-btn { 
            flex: 0 0 auto; padding: 8px 12px; border-radius: 5px; font-size: 10px; font-weight: bold;
            border: 1px solid var(--neon-cian); background: transparent; color: var(--neon-cian);
        }
        .list-btn.active { background: var(--neon-cian); color: #000; box-shadow: 0 0 10px var(--neon-cian); }

        #search { 
            width: 100%; padding: 8px; border-radius: 20px; border: 1px solid var(--neon-magenta);
            background: rgba(255, 255, 255, 0.05); color: #fff; text-align: center; font-size: 11px;
        }

        /* GRID DE CANALES */
        .main-content { padding-top: 165px; padding-bottom: 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 12px; }

        .card { 
            background: var(--glass); border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 12px; padding: 15px; text-align: center;
            transition: 0.3s;
        }
        .card img { width: 55px; height: 55px; border-radius: 50%; margin-bottom: 8px; border: 1px solid var(--neon-cian); }
        .card span { display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        /* REPRODUCTOR FLOTANTE AJUSTADO */
        #player-modal { 
            display: none; position: fixed; inset: 0; z-index: 2000; 
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center; padding: 15px;
        }

        .modal-content {
            width: 100%; max-width: 600px; background: #000;
            border: 2px solid var(--neon-cian); border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 25px var(--neon-cian);
        }

        .iframe-container { position: relative; width: 100%; padding-top: 56.25%; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .close-btn { 
            width: 100%; padding: 12px; background: #ff2d55; color: #fff; 
            border: none; font-family: 'Orbitron', sans-serif; font-weight: bold;
        }

        footer { 
            position: fixed; bottom: 0; width: 100%; padding: 8px; text-align: center;
            background: rgba(5, 5, 10, 0.9); border-top: 1px solid var(--neon-cian);
            font-size: 10px; color: var(--neon-cian);
        }
    </style>
</head>
<body>

<div class="carousel-bg">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1200')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1200')"></div>
</div>

<div class="header">
    <h1 class="title-main">FUSIÓN CRACKS+VPN</h1>
    <div class="download-buttons">
        <button id="btn-main" class="list-btn active" onclick="loadM3U(MAIN_M3U, this)">CANALES ACEX</button>
        <button class="list-btn" onclick="loadM3U(EVENTS_M3U, this)">EVENTOS ACEX</button>
        <button class="list-btn" onclick="loadXML_Ev2(this)">CANALES PRE</button>
        <button class="list-btn" onclick="loadXML_Ev3(this)">EVENTOS PRE</button>
        <button class="list-btn" onclick="loadXML_Ev4(this)">PRE + VPN</button>
        <button class="list-btn" onclick="loadAgenda(this)">+ EVENTOS</button>
    </div>
    <input type="text" id="search" placeholder="--- BUSCAR CANAL ---" onkeyup="filter()">
</div>

<div class="main-content">
    <div id="channel-list" class="grid"></div>
</div>

<div id="player-modal">
    <div class="modal-content">
        <div class="iframe-container">
            <iframe id="video-iframe" src="" allowfullscreen allow="autoplay"></iframe>
        </div>
        <button class="close-btn" onclick="closePlayer()">CERRAR</button>
    </div>
</div>

<footer>⚡ EL DEPORTE SIN LÍMITES • 2026 ⚡</footer>

<script>
    // Configuración de URLs
    const MAIN_M3U = 'https://raw.githubusercontent.com/Icastresana/lista1/refs/heads/main/Probando';
    const EVENTS_M3U = 'https://raw.githubusercontent.com/Icastresana/lista1/main/eventos.m3u';
    const XML_EV2 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/lista_canales_DEPORTE-LIBRE.FANS.xml';
    const XML_EV3 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/eventos_livetv_sx_con_reproductores.xml';
    const XML_EV4 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/lista_sportsonlineci.xml';
    const AGENDA_URL = 'https://agenda-navy-six.vercel.app/agenda_deportiva.html';
    const LOGO = 'https://i.postimg.cc/mDrdRhMG/logo1-31-151811.png';

    let channels = [];

    function setActive(el) {
        document.querySelectorAll('.list-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function render() {
        const list = document.getElementById('channel-list');
        list.innerHTML = channels.map((c, i) => `
            <div class="card" onclick="play(${i})">
                <img src="${LOGO}">
                <span>${c.name}</span>
            </div>
        `).join('');
    }

    // CARGAS ORIGINALES RESTAURADAS
    function loadM3U(url, el) {
        setActive(el); channels = [];
        fetch(url).then(r => r.text()).then(t => {
            t.split('\n').forEach((line, i, arr) => {
                if (line.startsWith('#EXTINF:')) {
                    channels.push({ name: line.split(',')[1].trim(), link: arr[i+1].trim() });
                }
            });
            render();
        });
    }

    function loadXML_Ev2(el) { setActive(el); channels = []; fetch(XML_EV2).then(r => r.text()).then(t => { const x = new DOMParser().parseFromString(t, "text/xml"); x.querySelectorAll('channel, canal').forEach(item => { channels.push({ name: item.getAttribute('name'), link: item.querySelector('url')?.textContent }); }); render(); }); }
    
    // Esta es la que no cargaba:
    function loadXML_Ev3(el) { 
        setActive(el); channels = []; 
        fetch(XML_EV3).then(r => r.text()).then(t => { 
            const x = new DOMParser().parseFromString(t, "text/xml"); 
            x.querySelectorAll('evento, event').forEach(ev => { 
                channels.push({ name: ev.querySelector('nombre, title')?.textContent, link: ev.querySelector('url, link')?.textContent }); 
            }); 
            render(); 
        }); 
    }

    function loadXML_Ev4(el) { setActive(el); channels = []; fetch(XML_EV4).then(r => r.text()).then(t => { const x = new DOMParser().parseFromString(t, "text/xml"); Array.from(x.getElementsByTagName("track")).forEach(t => { channels.push({ name: t.getElementsByTagName("title")[0]?.textContent, link: t.getElementsByTagName("url")[0]?.textContent }); }); render(); }); }

    function loadAgenda(el) {
        setActive(el); channels = []; 
        fetch(AGENDA_URL).then(r => r.text()).then(html => {
            const doc = new DOMParser().parseFromString(html, "text/html");
            doc.querySelectorAll('table tr').forEach(row => {
                const link = row.querySelector('td a');
                if (link) channels.push({ name: link.textContent, link: link.href, type: 'agenda' });
            });
            render();
        });
    }

    function play(i) {
        const c = channels[i];
        if (c.type === 'agenda') { window.open(c.link, '_blank'); return; }
        if (c.link.includes('acestream://')) { window.location.href = c.link; return; }
        document.getElementById('video-iframe').src = c.link;
        document.getElementById('player-modal').style.display = 'flex';
    }

    function closePlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.getElementById('video-iframe').src = '';
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = channels.filter(c => c.name.toLowerCase().includes(q));
        const list = document.getElementById('channel-list');
        list.innerHTML = filtered.map((c, i) => `
            <div class="card" onclick="play(${i})">
                <img src="${LOGO}">
                <span>${c.name}</span>
            </div>
        `).join('');
    }

    // Fondo
    let cur = 0;
    const s = document.querySelectorAll('.slide');
    setInterval(() => { s[cur].classList.remove('active'); cur = (cur + 1) % s.length; s[cur].classList.add('active'); }, 4000);

    loadM3U(MAIN_M3U, document.getElementById('btn-main'));
</script>
</body>
</html>
