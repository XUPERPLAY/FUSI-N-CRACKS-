<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUSIÓN CRACKS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro: #0a0a0f;
            --azul-neon: #00f0ff;
            --magenta-neon: #ff00aa;
            --dorado: #ffd700;
            --tarjeta: rgba(18, 18, 35, 0.92);
            --borde: rgba(0, 240, 255, 0.25);
            --rojo: #ff2d55;
        }

        /* Estilos base y scroll */
        * { margin:0; padding:0; box-sizing:border-box; outline: none; }
        body { 
            background: linear-gradient(135deg, #0a0a0f 0%, #000428 50%, #0a0a0f 100%); 
            color: #e0f7ff; 
            font-family: 'Roboto', sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* FOCO PARA MANDO (TV) */
        :focus {
            border: 2px solid var(--azul-neon) !important;
            box-shadow: 0 0 20px var(--azul-neon) !important;
            transform: scale(1.05);
            background: rgba(0, 240, 255, 0.2) !important;
        }

        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(5,5,15,0.97); backdrop-filter: blur(12px); border-bottom: 2px solid var(--azul-neon); padding: 10px; z-index: 999; }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logo { width: 30px; height: 30px; filter: drop-shadow(0 0 8px var(--azul-neon)); }
        .title-main { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; background: linear-gradient(90deg, var(--azul-neon), var(--magenta-neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .byline { font-size: 9px; color: #88ddff; text-align: center; margin-bottom: 5px; }

        .download-buttons { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 5px 0; }
        .list-btn { padding: 8px 15px; border-radius: 5px; font-size: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: 1px solid var(--borde); background: #1a1a2e; color: #fff; transition: 0.3s; }
        .list-btn.active { background: var(--azul-neon); color: #000; border: none; }

        .main-content { padding-top: 180px; padding-bottom: 70px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 0 15px; }

        .card { 
            position: relative; background: var(--tarjeta); padding: 15px; border-radius: 10px; 
            text-align: center; border: 1px solid var(--borde); transition: 0.3s; cursor: pointer;
        }
        .card img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 10px; border: 2px solid var(--azul-neon); }
        .card span { font-size: 12px; font-weight: 700; display: block; }

        /* REPRODUCTOR FLOTANTE */
        #player-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-container { position: relative; width: 90%; max-width: 800px; aspect-ratio: 16 / 9; border: 2px solid var(--azul-neon); box-shadow: 0 0 30px var(--azul-neon); background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; bottom: -45px; right: 0; background: var(--rojo); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        footer { position: fixed; bottom: 0; left: 0; right: 0; text-align: center; padding: 10px; font-size: 11px; color: var(--azul-neon); background: #05050f; border-top: 1px solid var(--azul-neon); }
    </style>
</head>
<body tabindex="-1">

<div class="header">
    <div class="header-top">
        <img src="https://i.postimg.cc/mDrdRhMG/logo1-31-151811.png" class="logo">
        <h1 class="title-main">FUSIÓN CRACKS+VPN</h1>
    </div>
    <div class="byline">@By PACO & @By D.D.M--Android + Ios</div>

    <div class="download-buttons">
        <button tabindex="0" id="btn-main" class="list-btn active" onclick="loadM3U(MAIN_M3U, true, this)">CANALES ACEX</button>
        <button tabindex="0" class="list-btn" onclick="loadM3U(EVENTS_M3U, true, this)">EVENTOS ACEX</button>
        <button tabindex="0" class="list-btn" onclick="loadXML_Ev2(this)">CANALES PRE</button>
        <button tabindex="0" class="list-btn" onclick="loadXML_Ev3(this)">EVENTOS PRE</button>
        <button tabindex="0" class="list-btn" onclick="loadXML_Ev4(this)">PRE + VPN</button>
        <button tabindex="0" class="list-btn" onclick="loadAgenda(this)">+ EVENTOS</button>
    </div>
</div>

<div class="main-content">
    <div id="loading" style="text-align: center; margin-top: 50px;">CARGANDO...</div>
    <div id="channel-list" class="grid"></div>
</div>

<div id="player-modal">
    <div class="modal-container">
        <iframe id="video-iframe" src="" allowfullscreen allow="autoplay"></iframe>
        <button tabindex="0" class="close-btn" onclick="closePlayer()">CERRAR</button>
    </div>
</div>

<footer>⚡ FUSIÓN CRACKS ⚡ • 2026</footer>

<script>
    // URLs originales (SIN TOCAR)
    const MAIN_M3U = 'https://raw.githubusercontent.com/Icastresana/lista1/refs/heads/main/Probando';
    const EVENTS_M3U = 'https://raw.githubusercontent.com/Icastresana/lista1/main/eventos.m3u';
    const XML_EV2 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/lista_canales_DEPORTE-LIBRE.FANS.xml';
    const XML_EV3 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/eventos_livetv_sx_con_reproductores.xml';
    const XML_EV4 = 'https://raw.githubusercontent.com/tutw/platinsport-m3u-updater/refs/heads/main/lista_sportsonlineci.xml';
    const AGENDA_URL = 'https://agenda-navy-six.vercel.app/agenda_deportiva.html';
    const LOGO = 'https://i.postimg.cc/mDrdRhMG/logo1-31-151811.png';

    let channels = [];

    function setActive(el) {
        document.querySelectorAll('.list-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function render() {
        document.getElementById('loading').style.display = 'none';
        const list = document.getElementById('channel-list');
        list.innerHTML = channels.map((c, i) => `
            <div class="card" tabindex="0" onclick="play(${i})">
                <img src="${LOGO}">
                <span>${c.name}</span>
            </div>
        `).join('');
    }

    // Funciones de carga originales (Mantenidas intactas)
    function loadM3U(u, f, el) { setActive(el); channels = []; fetch(u).then(r => r.text()).then(t => { t.split('\n').forEach((line, i, arr) => { if (line.startsWith('#EXTINF:')) { channels.push({ name: line.split(',').slice(1).join(','), link: arr[i+1]?.trim() }); } }); render(); }); }
    function loadXML_Ev2(el) { setActive(el); channels = []; fetch(XML_EV2).then(r => r.text()).then(t => { const x = new DOMParser().parseFromString(t, "text/xml"); x.querySelectorAll('channel, canal').forEach(item => { channels.push({ name: item.getAttribute('name'), link: item.querySelector('url')?.textContent }); }); render(); }); }
    function loadXML_Ev3(el) { setActive(el); channels = []; fetch(XML_EV3).then(r => r.text()).then(t => { const x = new DOMParser().parseFromString(t, "text/xml"); x.querySelectorAll('evento, event, item').forEach(ev => { const n = ev.querySelector('nombre, title, name')?.textContent; const l = ev.querySelector('url, link')?.textContent; if(l) channels.push({ name: n, link: l }); }); render(); }); }
    function loadXML_Ev4(el) { setActive(el); channels = []; fetch(XML_EV4).then(r => r.text()).then(t => { const x = new DOMParser().parseFromString(t, "text/xml"); Array.from(x.getElementsByTagName("track")).forEach(tr => { channels.push({ name: tr.getElementsByTagName("title")[0]?.textContent, link: tr.getElementsByTagName("url")[0]?.textContent }); }); render(); }); }
    function loadAgenda(el) { setActive(el); channels = []; fetch(AGENDA_URL).then(r => r.text()).then(h => { const doc = new DOMParser().parseFromString(h, "text/html"); doc.querySelectorAll('table tr').forEach(row => { const a = row.querySelector('a'); if(a) channels.push({ name: a.textContent, link: a.href, type: 'agenda' }); }); render(); }); }

    function play(i) {
        const c = channels[i];
        if (c.type === 'agenda') { window.open(c.link, '_blank'); return; }
        let url = c.link;
        if (url.includes('acestream://')) { window.location.href = url; return; }
        document.getElementById('video-iframe').src = url;
        document.getElementById('player-modal').style.display = 'flex';
        document.querySelector('.close-btn').focus(); // Foco al botón cerrar para el mando
    }

    function closePlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.getElementById('video-iframe').src = '';
    }

    // SOPORTE PARA MANDO (D-PAD)
    document.addEventListener('keydown', (e) => {
        const active = document.activeElement;
        const focusable = Array.from(document.querySelectorAll('button, .card, .list-btn, [tabindex="0"]'));
        let index = focusable.indexOf(active);

        if (e.key === 'ArrowRight') {
            index = (index + 1) % focusable.length;
            focusable[index].focus();
        } else if (e.key === 'ArrowLeft') {
            index = (index - 1 + focusable.length) % focusable.length;
            focusable[index].focus();
        } else if (e.key === 'ArrowDown') {
            // Salto aproximado de fila
            index = (index + 4) % focusable.length;
            focusable[index].focus();
        } else if (e.key === 'ArrowUp') {
            index = (index - 4 + focusable.length) % focusable.length;
            focusable[index].focus();
        } else if (e.key === 'Enter') {
            active.click();
        }
    });

    loadM3U(MAIN_M3U, true, document.getElementById('btn-main'));
</script>
</body>
</html>
